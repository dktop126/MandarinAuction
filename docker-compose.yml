services:
  postgres:
    image: postgres:15
    container_name: mandarin-postgres
    environment:
      POSTGRES_DB: mandarin_auction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mandarin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: MandarinAuction.API/Dockerfile
    container_name: mandarin-api
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=mandarin_auction;Username=postgres;Password=postgres
      - Jwt__Key=your-secret-key-min-32-characters-long
      - Jwt__Issuer=MandarinAuction
      - Jwt__Audience=MandarinAuctionUsers
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mandarin-network
    restart: on-failure

  frontend:
    image: nginx:alpine
    container_name: mandarin-frontend
    ports:
      - "8080:80"
    volumes:
      - ./MandarinAuction.Frontend:/usr/share/nginx/html:ro
    networks:
      - mandarin-network
    restart: on-failure

volumes:
  postgres_data:

networks:
  mandarin-network:
    driver: bridge
