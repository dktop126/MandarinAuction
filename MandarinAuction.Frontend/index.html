<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandarin Auction - Демонстрация</title>
</head>
<body>
<!-- Кнопка авторизации/регистрации -->
<div style="margin-bottom: 20px;">
    <button id="authBtn" onclick="openAuthModal()">Войти / Регистрация</button>
    <span id="userInfo" style="margin-left: 10px; display: none;">
            Привет, <span id="userEmail"></span>!
            <button onclick="logout()">Выйти</button>
        </span>
</div>

<!-- Список аукционов -->
<div>
    <h2>Активные аукционы</h2>
    <div id="auctionsList">Загрузка...</div>
</div>

<!-- Модальное окно авторизации -->
<div id="authModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);">
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; min-width: 300px;">
        <h3 id="modalTitle">Вход / Регистрация</h3>

        <!-- Шаг 1: Ввод почты -->
        <div id="emailStep">
            <p>Введите вашу почту:</p>
            <input type="email" id="emailInput" placeholder="example@mail.ru" style="width: 100%; margin-bottom: 10px; padding: 5px;">
            <button onclick="sendCode()">Отправить код</button>
        </div>

        <!-- Шаг 2: Ввод кода -->
        <div id="codeStep" style="display: none;">
            <p>Введите код из почты:</p>
            <input type="text" id="codeInput" placeholder="123456" style="width: 100%; margin-bottom: 10px; padding: 5px;">
            <button onclick="verifyCode()">Войти</button>
        </div>

        <button onclick="closeAuthModal()" style="margin-top: 10px;">Закрыть</button>
        <p id="message" style="color: red;"></p>
    </div>
</div>

<script>
    const API_URL = 'https://localhost:44316/api';
    let token = localStorage.getItem('token');
    let userEmail = localStorage.getItem('userEmail');

    // Проверка авторизации при загрузке
    if (token && userEmail) {
        showUserInfo();
    }

    // Открытие модального окна
    function openAuthModal() {
        document.getElementById('authModal').style.display = 'block';
        document.getElementById('emailStep').style.display = 'block';
        document.getElementById('codeStep').style.display = 'none';
        document.getElementById('message').textContent = '';
        document.getElementById('emailInput').value = '';
        document.getElementById('codeInput').value = '';
    }

    // Закрытие модального окна
    function closeAuthModal() {
        document.getElementById('authModal').style.display = 'none';
    }

    // Отправка кода на почту
    async function sendCode() {
        const email = document.getElementById('emailInput').value.trim();
        if (!email) {
            document.getElementById('message').textContent = 'Введите почту';
            return;
        }

        try {
            const formData = new FormData();
            formData.append('Email', email);

            const response = await fetch(`${API_URL}/auth/request-code`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                document.getElementById('emailStep').style.display = 'none';
                document.getElementById('codeStep').style.display = 'block';
                document.getElementById('message').textContent = 'Код отправлен!';
                document.getElementById('message').style.color = 'green';
            } else {
                document.getElementById('message').textContent = 'Ошибка отправки кода';
                document.getElementById('message').style.color = 'red';
            }
        } catch (error) {
            document.getElementById('message').textContent = 'Ошибка соединения с сервером';
            console.error(error);
        }
    }

    // Проверка кода и вход
    async function verifyCode() {
        const email = document.getElementById('emailInput').value.trim();
        const code = document.getElementById('codeInput').value.trim();

        if (!code) {
            document.getElementById('message').textContent = 'Введите код';
            return;
        }

        try {
            const response = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    otpCode: code
                })
            });

            if (response.ok) {
                const data = await response.json();
                token = data.token;
                userEmail = data.email;
                localStorage.setItem('token', token);
                localStorage.setItem('userEmail', userEmail);

                closeAuthModal();
                showUserInfo();
                loadAuctions();
            } else {
                document.getElementById('message').textContent = 'Неверный код или почта';
                document.getElementById('message').style.color = 'red';
            }
        } catch (error) {
            document.getElementById('message').textContent = 'Ошибка соединения с сервером';
            console.error(error);
        }
    }

    // Выход
    function logout() {
        token = null;
        userEmail = null;
        localStorage.removeItem('token');
        localStorage.removeItem('userEmail');
        hideUserInfo();
        loadAuctions();
    }

    // Показать информацию о пользователе
    function showUserInfo() {
        document.getElementById('authBtn').style.display = 'none';
        document.getElementById('userInfo').style.display = 'inline';
        document.getElementById('userEmail').textContent = userEmail;
    }

    // Скрыть информацию о пользователе
    function hideUserInfo() {
        document.getElementById('authBtn').style.display = 'inline';
        document.getElementById('userInfo').style.display = 'none';
    }

    // Перевод статуса в текстовый формат
    function getAuctionStatusText(status) {
        switch(status) {
            case 0: return 'Активен';
            case 1: return 'Завершён';
            case 2: return 'Закрыт';
            default: return 'Неизвестно';
        }
    }
    
    // Загрузка списка аукционов
    async function loadAuctions() {
        const auctionsList = document.getElementById('auctionsList');
        auctionsList.textContent = 'Загрузка...';

        try {
            const response = await fetch(`${API_URL}/auction`);

            if (!response.ok) {
                auctionsList.textContent = 'Ошибка загрузки аукционов';
                return;
            }

            const auctions = await response.json();

            if (auctions.length === 0) {
                auctionsList.textContent = 'Нет активных аукционов';
                return;
            }

            let html = '';
            auctions.forEach(auction => {
                const minBid = auction.currentPrice + auction.minBidIncrement;
                html += `
                        <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; display: flex; gap: 15px;">
                            <div style="flex-shrink: 0;">
                                <img src="${auction.mandarinImageUrl}" alt="${auction.mandarinName}" style="width: 150px; height: 150px; object-fit: cover; border-radius: 8px;">
                            </div>
                            <div style="flex-grow: 1;">
                                <h4>${auction.mandarinName}</h4>
                                <p><strong>Текущая цена:</strong> ${auction.currentPrice} ₽</p>
                                <p><strong>Начальная цена:</strong> ${auction.startingPrice} ₽</p>
                                ${auction.buyoutPrice ? `<p><strong>Цена выкупа:</strong> ${auction.buyoutPrice} ₽</p>` : ''}
                                <p><strong>Окончание:</strong> ${new Date(auction.endTime).toLocaleString()}</p>
                                <p><strong>Статус:</strong> ${getAuctionStatusText(auction.status)}</p>
                                ${token ? `
                                    <div style="margin-top: 10px;">
                                        <label>Размер ставки: </label>
                                        <input type="number" id="bidAmount_${auction.id}" placeholder="Мин. ${minBid} ₽" min="${minBid}" step="${auction.minBidIncrement}" style="width: 150px; padding: 5px;">
                                        <button onclick="placeBid('${auction.id}', document.getElementById('bidAmount_${auction.id}').value)">Сделать ставку</button>
                                        <button onclick="quickBid('${auction.id}', ${minBid})" style="margin-left: 5px;">+1 шаг</button>
                                        ${auction.buyoutPrice ? `<button onclick="buyout('${auction.id}')" style="margin-left: 10px; background-color: #ff6b35; color: white;">Выкупить за ${auction.buyoutPrice} ₽</button>` : ''}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
            });

            auctionsList.innerHTML = html;
        } catch (error) {
            auctionsList.textContent = 'Ошибка загрузки аукционов';
            console.error(error);
        }
    }

    // Выкупить лот
    async function buyout(auctionId) {
        if (!token) {
            alert('Сначала войдите в систему');
            return;
        }

        if (!confirm('Вы уверены, что хотите выкупить этот лот? Аукцион будет завершён немедленно.')) {
            return;
        }

        try {
            const response = await fetch(`${API_URL}/auction/${auctionId}/buyout`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (response.ok) {
                alert('Лот выкуплен успешно! Чек отправлен на вашу почту.');
                loadAuctions();
            } else {
                const errorText = await response.text();
                try {
                    const error = JSON.parse(errorText);
                    let errorMessage = 'Не удалось выкупить лот';

                    if (error.title && error.detail) {
                        errorMessage = `${error.title}: ${error.detail}`;
                    } else if (error.title) {
                        errorMessage = error.title;
                    } else if (error.detail) {
                        errorMessage = error.detail;
                    } else if (error.message) {
                        errorMessage = error.message;
                    }

                    alert('Ошибка: ' + errorMessage);
                } catch (e) {
                    alert('Ошибка: ' + (errorText || 'Не удалось выкупить лот'));
                }
            }
        } catch (error) {
            alert('Ошибка соединения с сервером');
            console.error('Network error:', error);
        }
    }

    // Быстрая ставка (+1 шаг)
    function quickBid(auctionId, minBidAmount) {
        placeBid(auctionId, minBidAmount);
    }
    
    // Сделать ставку
    async function placeBid(auctionId, amount) {
        if (!token) {
            alert('Сначала войдите в систему');
            return;
        }
        
        const bidAmount = parseFloat(amount);
        if (!bidAmount) {
            alert('Введите сумму ставки');
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/auction/${auctionId}/bids`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    amount: bidAmount
                })
            });

            if (response.ok) {
                alert('Ставка сделана успешно!');
                loadAuctions();
            } else {
                console.log('=== Ошибка ставки ===');
                console.log('Status:', response.status);
                console.log('Status Text:', response.statusText);
                console.log('Headers:', Object.fromEntries(response.headers.entries()));

                const errorText = await response.text();
                console.log('Raw response body:', errorText);

                try {
                    const error = JSON.parse(errorText);
                    console.log('Parsed error object:', error);
                    
                    let errorMessage = 'Не удалось сделать ставку';

                    if (error.title && error.detail) {
                        errorMessage = `${error.title}: ${error.detail}`;
                    } else if (error.title) {
                        errorMessage = error.title;
                    } else if (error.detail) {
                        errorMessage = error.detail;
                    } else if (error.message) {
                        errorMessage = error.message;
                    }

                    console.log('Final error message for user:', errorMessage);
                    alert('Ошибка: ' + errorMessage);
                } catch (e) {
                    console.error('Failed to parse error JSON:', e);
                    alert('Ошибка: ' + (errorText || 'Не удалось сделать ставку'));
                }
            }
        } catch (error) {
            alert('Ошибка соединения с сервером');
            console.error('Network error:', error);
        }
    }

    // Загрузка аукционов при старте
    loadAuctions();

    // Автоматическое обновление списка аукционов каждые 5 секунд
    //setInterval(loadAuctions, 5000);
</script>
</body>
</html>
